
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0;max-width:680px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.header h2{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.day-badge{font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:4px 10px}
.coins-bar{display:flex;gap:8px;margin-bottom:1.25rem}
.coin-stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;flex:1;text-align:center}
.coin-stat .val{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.coin-stat .lbl{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:1rem;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.cat-tab.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:transparent}
.task-list{display:flex;flex-direction:column;gap:10px}
.task-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;cursor:pointer;transition:border-color .15s}
.task-card:hover{border-color:var(--color-border-secondary)}
.task-card.done{opacity:.55;pointer-events:none}
.task-card.done .task-status{display:block}
.task-top{display:flex;align-items:flex-start;gap:12px}
.task-icon{font-size:22px;flex-shrink:0;line-height:1;margin-top:1px}
.task-info{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:500;color:var(--color-text-primary);line-height:1.4}
.task-sub{font-size:12px;color:var(--color-text-secondary);margin-top:3px}
.task-meta{display:flex;gap:6px;margin-top:8px;align-items:center}
.badge{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:500}
.badge-easy{background:#eaf3de;color:#3b6d11}
.badge-medium{background:#faeeda;color:#854f0b}
.badge-hard{background:#faece7;color:#993c1d}
.badge-coins{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
.badge-method{background:var(--color-background-info);color:var(--color-text-info)}
.task-status{display:none;font-size:11px;font-weight:500;color:#3b6d11;margin-top:6px}
.task-btn{flex-shrink:0;padding:6px 14px;font-size:12px;font-weight:500;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;white-space:nowrap}
.task-btn:hover{background:var(--color-background-secondary)}
.task-timer{display:none;margin-top:10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.timer-bar-wrap{height:4px;background:var(--color-border-tertiary);border-radius:2px;margin:6px 0 4px;overflow:hidden}
.timer-bar{height:4px;background:var(--color-text-primary);border-radius:2px;width:0%;transition:width .1s linear}
.timer-label{font-size:11px;color:var(--color-text-secondary);display:flex;justify-content:space-between}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-xl);padding:1.5rem;width:min(92vw,420px);border:0.5px solid var(--color-border-tertiary)}
.modal h3{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.modal .sub{font-size:12px;color:var(--color-text-secondary);margin-bottom:1.25rem}
.q-timer-ring{display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;width:60px;height:60px;position:relative}
.q-timer-ring svg{position:absolute;inset:0}
.q-timer-num{font-size:22px;font-weight:500;color:var(--color-text-primary);position:relative;z-index:1}
.q-text{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:1rem;line-height:1.5;text-align:center}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.q-opt{padding:10px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);font-size:13px;color:var(--color-text-primary);cursor:pointer;text-align:center;transition:all .12s}
.q-opt:hover{border-color:var(--color-border-primary);background:var(--color-background-secondary)}
.q-opt.correct{background:#eaf3de;border-color:#9FE1CB;color:#3b6d11}
.q-opt.wrong{background:#fcebeb;border-color:#F7C1C1;color:#a32d2d}
.q-progress{display:flex;gap:4px;margin-bottom:1rem}
.q-dot{flex:1;height:3px;border-radius:2px;background:var(--color-border-tertiary)}
.q-dot.done{background:var(--color-text-primary)}
.q-dot.current{background:var(--color-text-secondary)}
.result-wrap{text-align:center}
.result-score{font-size:36px;font-weight:500;color:var(--color-text-primary);margin:8px 0}
.result-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.25rem}
.result-coins{display:inline-flex;align-items:center;gap:6px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 16px;font-size:14px;font-weight:500;margin-bottom:1.25rem}
.btn-primary{width:100%;padding:10px;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);font-size:14px;font-weight:500;cursor:pointer}
.btn-primary:hover{opacity:.85}
</style>

let doneIds = new Set();
let coinCount = 140;
let currentTask = null;
let currentQ = 0;
let score = 0;
let qTimer = null;
let qTimeLeft = 5;
let answered = false;
let activeFilterCat = 'all';

function filterCat(cat, el) {
  activeFilterCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTasks();
}

function renderTasks() {
  const list = document.getElementById('taskList');
  const filtered = activeFilterCat === 'all' ? TASKS : TASKS.filter(t => t.cat === activeFilterCat);
  list.innerHTML = filtered.map(t => {
    const done = doneIds.has(t.id);
    return `<div class="task-card${done?' done':''}" id="card_${t.id}">
      <div class="task-top">
        <div class="task-icon">${t.icon}</div>
        <div class="task-info">
          <div class="task-title">${t.title}</div>
          <div class="task-sub">${t.sub}</div>
          <div class="task-meta">
            <span class="badge badge-${t.diff}">${t.diff}</span>
            <span class="badge badge-coins">+${t.coins} coins</span>
            <span class="badge badge-method">${t.method}</span>
          </div>
          ${done ? '<div class="task-status">Done! Coins earned.</div>' : ''}
        </div>
        ${!done ? `<button class="task-btn" onclick="startTask('${t.id}')">Start</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function startTask(id) {
  currentTask = TASKS.find(t => t.id === id);
  currentQ = 0;
  score = 0;
  answered = false;
  document.getElementById('quizTaskTitle').textContent = currentTask.title;
  document.getElementById('quizTaskSub').textContent = 'Answer 3 quick questions in 5 seconds each';
  document.getElementById('quizPhase').style.display = 'block';
  document.getElementById('resultPhase').style.display = 'none';
  document.getElementById('modalBg').classList.add('open');
  renderQuestion();
}

function renderQuestion() {
  const q = currentTask.questions[currentQ];
  const total = currentTask.questions.length;
  answered = false;

  document.getElementById('qNum').textContent = `Q${currentQ+1} of ${total}`;
  document.getElementById('qText').textContent = q.q;

  const prog = document.getElementById('qProgress');
  prog.innerHTML = currentTask.questions.map((_,i) =>
    `<div class="q-dot ${i < currentQ ? 'done' : i === currentQ ? 'current' : ''}"></div>`
  ).join('');

  const opts = document.getElementById('qOpts');
  opts.innerHTML = q.opts.map((o,i) =>
    `<button class="q-opt" id="opt_${i}" onclick="selectAnswer(${i})">${o}</button>`
  ).join('');

  startCountdown();
}

function startCountdown() {
  if (qTimer) clearInterval(qTimer);
  qTimeLeft = 5;
  updateTimerDisplay(5);

  qTimer = setInterval(() => {
    qTimeLeft -= 0.1;
    updateTimerDisplay(qTimeLeft);
    if (qTimeLeft <= 0) {
      clearInterval(qTimer);
      if (!answered) timeOut();
    }
  }, 100);
}

function updateTimerDisplay(t) {
  const n = Math.max(0, t);
  document.getElementById('timerNum').textContent = Math.ceil(n);
  const circumference = 163.4;
  const offset = circumference * (1 - n / 5);
  document.getElementById('timerCircle').style.strokeDashoffset = offset;
  const color = n > 3 ? 'var(--color-text-primary)' : n > 1.5 ? '#BA7517' : '#E24B4A';
  document.getElementById('timerCircle').style.stroke = color;
  document.getElementById('timerNum').style.color = color;
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(qTimer);
  const q = currentTask.questions[currentQ];
  const correct = idx === q.ans;
  if (correct) score++;

  document.querySelectorAll('.q-opt').forEach((el, i) => {
    if (i === q.ans) el.classList.add('correct');
    else if (i === idx && !correct) el.classList.add('wrong');
    el.style.pointerEvents = 'none';
  });

  setTimeout(() => nextQuestion(), 900);
}

function timeOut() {
  answered = true;
  const q = currentTask.questions[currentQ];
  document.querySelectorAll('.q-opt').forEach((el, i) => {
    if (i === q.ans) el.classList.add('correct');
    el.style.pointerEvents = 'none';
  });
  setTimeout(() => nextQuestion(), 900);
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= currentTask.questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('quizPhase').style.display = 'none';
  document.getElementById('resultPhase').style.display = 'block';
  const total = currentTask.questions.length;
  const passed = score >= 2;

  document.getElementById('resultEmoji').textContent = passed ? (score === total ? '' : '') : '';
  document.getElementById('resultScore').textContent = `${score} / ${total}`;

  let coinsEarned = 0;
  let sub = '';
  if (score === total) {
    coinsEarned = currentTask.coins + 5;
    sub = 'Perfect! Bonus +5 coins for full marks';
  } else if (passed) {
    coinsEarned = currentTask.coins;
    sub = 'Task verified! Coins added to your balance.';
  } else {
    sub = 'Score too low. Try again after completing the task again.';
  }

  document.getElementById('resultSub').textContent = sub;
  document.getElementById('resultCoins').innerHTML = passed
    ? `+${coinsEarned} coins earned`
    : 'Task not verified this time';

  if (passed) {
    doneIds.add(currentTask.id);
    coinCount += coinsEarned;
    document.getElementById('totalCoins').textContent = coinCount;
    document.getElementById('doneCount').textContent = `${doneIds.size}/5`;
  }
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  if (qTimer) clearInterval(qTimer);
  renderTasks();
}

document.getElementById('modalBg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

renderTasks();
</script>
